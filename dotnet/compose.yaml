name: skusync
services:
  web.api:
    build: .
    environment:
      - DOTNET_ENVIRONMENT
      - Skulabs__Api__ApiKey
      - Skulabs__Admin__Username
      - Skulabs__Admin__Password
      - Shopify__ApiKey
      - ConnectionStrings__SkuSync
      - Aws__Auth__SecretKey
      - Aws__Auth__AccessKey
    depends_on:
      - postgres
    
  postgres:
    image: postgres:18.3
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD