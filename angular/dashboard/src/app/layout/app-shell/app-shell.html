<!-- Application-wide navigation and content shell. -->
<div
  class="app-shell"
  [class.sidebar-collapsed]="sidebarCollapsed()"
  [class.mobile-navigation-open]="mobileNavigationOpen()"
>
  <aside class="sidebar" aria-label="Primary navigation">
    <div class="sidebar-header">
      <a class="brand" routerLink="/" aria-label="SkuSync dashboard home">
        <span class="brand-copy">
          <strong>SkuSync</strong>
          <span>Admin console</span>
        </span>
      </a>

      <button
        pButton
        type="button"
        class="sidebar-toggle desktop-only"
        [attr.aria-label]="sidebarCollapsed() ? 'Expand sidebar' : 'Collapse sidebar'"
        [attr.aria-expanded]="!sidebarCollapsed()"
        (click)="toggleSidebar()"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path [attr.d]="sidebarCollapsed() ? 'm9 18 6-6-6-6' : 'm15 18-6-6 6-6'" />
        </svg>
      </button>

      <button
        pButton
        type="button"
        class="sidebar-toggle mobile-only"
        aria-label="Close navigation"
        (click)="closeMobileNavigation()"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 6 12 12M18 6 6 18" /></svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      @for (item of navigationItems; track item.label) {
        @if (item.enabled) {
          <a
            class="nav-item"
            [routerLink]="item.route"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            [attr.aria-label]="sidebarCollapsed() ? item.label : null"
            (click)="closeMobileNavigation()"
          >
            <ng-container
              [ngTemplateOutlet]="navigationIcon"
              [ngTemplateOutletContext]="{ icon: item.icon }"
            />
            <span class="nav-label">{{ item.label }}</span>
          </a>
        } @else {
          <span class="nav-item disabled" aria-disabled="true">
            <ng-container
              [ngTemplateOutlet]="navigationIcon"
              [ngTemplateOutletContext]="{ icon: item.icon }"
            />
            <span class="nav-label">{{ item.label }}</span>
            <span class="coming-soon">Soon</span>
          </span>
        }
      }
    </nav>

    <div class="sidebar-footer">
      <span class="environment-indicator" aria-hidden="true"></span>
      <span class="environment-copy">
        <strong>Local environment</strong>
        <span>Development</span>
      </span>
    </div>
  </aside>

  <button
    type="button"
    class="sidebar-backdrop"
    aria-label="Close navigation"
    (click)="closeMobileNavigation()"
  ></button>

  <div class="workspace">
    <header class="topbar">
      <div class="topbar-title">
        <button
          pButton
          type="button"
          class="topbar-button mobile-only"
          aria-label="Open navigation"
          [attr.aria-expanded]="mobileNavigationOpen()"
          (click)="openMobileNavigation()"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16" /></svg>
        </button>
        <h1>{{ pageTitle() }}</h1>
      </div>
    </header>

    <main class="main-content">
      <router-outlet />
    </main>
  </div>
</div>

<ng-template #navigationIcon let-icon="icon">
  <span class="nav-icon" aria-hidden="true">
    @switch (icon) {
      @case ('dashboard') {
        <svg viewBox="0 0 24 24"><path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM14 14h6v6h-6z" /></svg>
      }
      @case ('variants') {
        <svg viewBox="0 0 24 24"><path d="m4 7 8-4 8 4-8 4-8-4Zm0 5 8 4 8-4M4 17l8 4 8-4" /></svg>
      }
    }
  </span>
</ng-template>
